services:
  - type: web
    name: legal-ai-agent
    runtime: python
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm ci && npm run build
    startCommand: >-
      gunicorn
      --chdir backend
      app.main:app
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120
      --worker-class uvicorn.workers.UvicornWorker
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./legal_ai.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: af-south-1
      - key: S3_BUCKET_NAME
        value: legal-ai-documents
      - key: REDIS_URL
        value: ""
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NODE_VERSION
        value: 20.11.1
